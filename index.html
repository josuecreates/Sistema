<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisTI — GTInfo / Prefeitura de Arapiraca</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* DESIGN TOKENS */
        :root {
            --bg: #07090f;
            --s1: #0f1420;
            --s2: #161d2e;
            --s3: #1c2538;
            --border: #1e2d47;
            --border2: #253552;
            --accent: #f97316;
            --accent-d: rgba(249, 115, 22, 0.13);
            --blue: #3b6fcc;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #475569;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --mono: "Space Mono", monospace;
            --sans: "Syne", sans-serif;
            --r: 12px;
            --rs: 8px;
            --sidebar-w: 240px;
            --topbar-h: 60px;
            --transition: .18s cubic-bezier(.4, 0, .2, 1);
        }

        /* RESET & BASE */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Grid background otimizado */
        body::before {
            content: "";
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: 
                linear-gradient(rgba(249, 115, 22, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ACESSIBILIDADE: Skip Link */
        .skip-link {
            position: absolute; top: -100%; left: 1rem; z-index: 9999;
            background: var(--accent); color: #fff;
            padding: 0.5rem 1rem; border-radius: var(--rs);
            text-decoration: none; font-weight: bold;
        }
        .skip-link:focus { top: 1rem; }

        /* LOGIN */
        #loginScreen {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(249, 115, 22, 0.07), var(--bg));
        }

        .login-card {
            width: 100%; max-width: 400px;
            background: var(--s1);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        /* FORMULÁRIO */
        .fg { margin-bottom: 1.2rem; }
        .lbl {
            display: block;
            font-family: var(--mono); font-size: 11px;
            text-transform: uppercase; color: var(--text2);
            margin-bottom: 0.5rem; letter-spacing: 1px;
        }

        .inp {
            width: 100%; padding: 12px 16px;
            background: var(--s2); border: 1px solid var(--border2);
            border-radius: var(--rs); color: var(--text);
            transition: all var(--transition);
        }

        .inp:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-d);
        }

        .btn-login {
            width: 100%; padding: 14px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--rs);
            font-weight: 800; cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-login:hover { background: #fb923c; }
        .btn-login:active { transform: scale(0.98); }

        /* APP LAYOUT */
        #app { display: none; } /* Alternar via JS */

        /* Estilos de utilitário */
        .hidden { display: none; }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <main id="loginScreen">
        <section class="login-card">
            <header class="login-logo-wrap">
                <div style="color: var(--accent); font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem;">GTInfo</div>
                <p class="login-tagline">SISTEMA DE GESTÃO DE TI</p>
            </header>

            <form id="formLogin">
                <div class="fg">
                    <label class="lbl" for="user">Usuário</label>
                    <input type="text" id="user" class="inp" placeholder="Digite seu usuário" required>
                </div>

                    <label class="lbl" for="pass">Senha</label>
                    <input type="password
